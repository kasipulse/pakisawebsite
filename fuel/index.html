<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pakisa Fuel Portal</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="app.js"></script>
</head>
<body>

<div class="login-box">

  <img
    src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1771237505/pakisa_logistics_express_pty_ltd_logo-removebg-preview_gr7h0r.png"
    class="logo"
  >

  <h2>Fuel Portal</h2>

  <input
    type="email"
    id="email"
    placeholder="Email"
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
  >

  <button onclick="login()">
    Login
  </button>

</div>

</body>
</html>
