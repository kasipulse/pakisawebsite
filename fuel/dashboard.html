      color:#072760;

    .section-header{
      display:flex;

      display:flex;

    h3{

    select,

    button{

      width:100%;

    select,
    input{

      background:
      linear-gradient(
        145deg,

        #eef2f5
      );

      border:1px solid #d7dde4;

      box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.05);
    }

    button{

      background:
      linear-gradient(
        145deg,
        #1a2f57,
        #072760
      );

      color:white;

      font-weight:bold;

      cursor:pointer;

      box-shadow:
      0 6px 16px rgba(7,39,96,0.25),
      inset 0 1px 0 rgba(255,255,255,0.15);

      transition:.2s;
    }

    button:hover{

      transform:translateY(-1px);

      background:
      linear-gradient(
        145deg,

      );

    .mini-btn{

      width:auto;

      linear-gradient(

      );

      color:#072760;

      box-shadow:
      0 3px 8px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .mini-btn:hover{
      color:white;
    }

    /* ---------------- VOUCHERS ---------------- */

    .voucher{

      padding:14px;

      border-radius:12px;

      margin-top:12px;

      font-size:14px;

      background:
      linear-gradient(
        145deg,
        #ffffff,
        #eef3f7
      );

      box-shadow:
      0 4px 10px rgba(0,0,0,0.05);
    }

    .pending{
      border-left:5px solid orange;
    }

    .verified{
      border-left:5px solid green;
    }

    .issued{
      border-left:5px solid #0F99DA;

      border-left:5px solid red;
    }

    /* ---------------- MODAL ---------------- */

    #sendModal{

      display:none;

    }

    .modal-box{

      width:90%;

      linear-gradient(

      );

      padding:22px;

      box-shadow:
      0 20px 40px rgba(0,0,0,0.25);

    }

      margin-top:0;
      margin-bottom:15px;
    }

    /* ---------------- FOOTER ---------------- */

    .footer-credit{
      text-align:center;

      color:#6f6f6f;

    }

    .footer-credit span{

    }

  </style>
</head>

<body>

<header>

  <div class="topbar-left">

    <div class="topbar-title">
      ⛽ Pakisa Fuel Dashboard
    </div>

    <div class="topbar-user" id="loggedUser">
      Loading user...
    </div>

  </div>

  <div class="topbar-links">

    <a href="setup.html">
      ⚙ Setup
    </a>

    <a href="../downloads.html">
      ⬇ Downloads
    </a>

    <a href="#" onclick="logout()">
      🚪 Logout
    </a>

  </div>

</header>

<div class="container">

  <!-- TODAY -->

  <div class="card total">

    <div class="total-label">
      Total Fuel Today
    </div>

    <div class="total-amount" id="totalFuel">
      R0
    </div>

  </div>

  <!-- MONTHLY -->

  <div class="card">

    <div class="monthly-box">

      <span>
        Monthly Fuel Balance
      </span>

      <strong id="monthlyFuel">
        R0
      </strong>

    </div>

  </div>

  <!-- CREATE -->

  <div class="card">

    <div class="section-header">

      <h3>
        Create Fuel Voucher
      </h3>

      <div class="quick-actions">

        <button
          class="mini-btn"
          onclick="addDriver()"
        >
          + Driver
        </button>

        <button
          class="mini-btn"
          onclick="addVehicle()"
        >
          + Vehicle
        </button>

      </div>

    </div>

    <select id="driverSelect">
      <option value="">Select Driver</option>
    </select>

    <select id="vehicleSelect">

    <input
      type="number"
      id="amount"
      placeholder="Estimated Fuel Amount"
    >

    <button onclick="createVoucher()">
      Create Voucher
    </button>

  </div>

  <!-- VOUCHERS -->

  <div class="card">

    <h3>
      Today's Vouchers
    </h3>

    <div id="voucherList"></div>

  </div>

</div>

<!-- MODAL -->

<div id="sendModal">

  <div class="modal-box">

    <h3>
      Send Voucher
    </h3>

    <button onclick="sendWhatsApp()">
      Send via WhatsApp

    <button onclick="sendSMS()">
      Send via SMS

    </button>

<div class="footer-credit">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  query,
  where,
  Timestamp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {

  apiKey: "AIzaSyC-tNc4sqO0gAstGxRXAkx4CR1xG2e831o",
  authDomain: "fuel-management-system-7784c.firebaseapp.com",
  projectId: "fuel-management-system-7784c",
  storageBucket: "fuel-management-system-7784c.firebasestorage.app",
  messagingSenderId: "718691738844",
  appId: "1:718691738844:web:a590ae6d2c734ffa1f4019"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let currentVoucher = null;

/* ---------------- AUTH ---------------- */

onAuthStateChanged(auth, (user) => {

  if(user){

    document.getElementById("loggedUser").innerText =
      "👤 " + user.email;

  } else {

    window.location.href = "../index.html";

  }

});

/* ---------------- LOGOUT ---------------- */

window.logout = async function(){

  await signOut(auth);

  window.location.href = "../index.html";
};

/* ---------------- QUICK ADD ---------------- */

window.addDriver = async function(){

  const name = prompt("Driver Name");

  if(!name) return;

  const phone = prompt("Driver Phone Number");

  if(!phone) return;

  await addDoc(collection(db,"drivers"),{

    name,
    phone

  });

  loadDrivers();

  alert("Driver added successfully");

};

window.addVehicle = async function(){

  const registration =
    prompt("Vehicle Registration");

  if(!registration) return;

  await addDoc(collection(db,"vehicles"),{

    registration:
      registration.toUpperCase()

  });

  loadVehicles();

  alert("Vehicle added successfully");

};

/* ---------------- LOAD DRIVERS ---------------- */

async function loadDrivers(){

  const select =
    document.getElementById("driverSelect");

  select.innerHTML =
  `<option value="">Select Driver</option>`;

  const snap =
    await getDocs(collection(db,"drivers"));

  snap.forEach(doc => {

    const d = doc.data();

    const opt =
      document.createElement("option");

    opt.value = JSON.stringify(d);

    opt.textContent =
      `${d.name} (${d.phone})`;

    select.appendChild(opt);

  });
}

loadDrivers();

/* ---------------- LOAD VEHICLES ---------------- */

async function loadVehicles(){

  const select =
    document.getElementById("vehicleSelect");

  select.innerHTML =
  `<option value="">Select Vehicle</option>`;

  const snap =
    await getDocs(collection(db,"vehicles"));

  snap.forEach(doc => {

    const d = doc.data();

    const opt =
      document.createElement("option");

    opt.value = d.registration;

    opt.textContent = d.registration;

    select.appendChild(opt);

  });
}

loadVehicles();

/* ---------------- HELPERS ---------------- */

function generateCode(){

  return "PKS-" +
    Math.floor(100000 + Math.random()*900000);

}

function isWeekend(){

  return [0,6].includes(new Date().getDay());

}

async function countVehicleToday(vehicle){

  const today =
    new Date().toISOString().split("T")[0];

  const q = query(

    collection(db,"fuel_vouchers"),

    where("vehicle","==",vehicle),

    where("date","==",today)

  );

  const snap = await getDocs(q);

  return snap.size;
}

/* ---------------- CREATE ---------------- */

window.createVoucher = async function(){

  const driverVal =
    document.getElementById("driverSelect").value;

  const vehicleVal =
    document.getElementById("vehicleSelect").value;

  const amount =
    Number(document.getElementById("amount").value);

  if(!driverVal || !vehicleVal || !amount){

    alert("Complete all fields");

    return;
  }

  const driver = JSON.parse(driverVal);

  const repeat =
    await countVehicleToday(vehicleVal);

  const requiresApproval =
    isWeekend() ||
    repeat >= 1 ||
    amount >= 1500;

  const voucher = {

    code: generateCode(),

    driver: driver.name,

    phone: driver.phone,

    vehicle: vehicleVal.toUpperCase(),

    amount: {
      estimated: amount,
      actual: null
    },

    status:
      requiresApproval
      ? "PENDING_APPROVAL"
      : "ISSUED",

    requiresApproval,

    date:
      new Date().toISOString().split("T")[0],

    createdAt: Timestamp.now()

  };

  await addDoc(
    collection(db,"fuel_vouchers"),
    voucher
  );

  if(requiresApproval){

    const msg =
`Fuel Approval Required
Driver: ${driver.name}
Vehicle: ${vehicleVal}
Amount: R${amount}`;

    window.open(

      `https://wa.me/27606527696?text=${encodeURIComponent(msg)}`,

      "_blank"

    );

  } else {

    currentVoucher = voucher;

    document.getElementById("sendModal").style.display =
      "flex";
  }

  document.getElementById("amount").value = "";

  loadVouchers();
};

/* ---------------- WHATSAPP ---------------- */

window.sendWhatsApp = function(){

  const msg =
`Fuel Voucher
Code: ${currentVoucher.code}
Vehicle: ${currentVoucher.vehicle}
Amount: R${currentVoucher.amount.estimated}`;

  window.open(

`https://wa.me/27${currentVoucher.phone.replace(/^0/,"")}?text=${encodeURIComponent(msg)}`

  );

  closeModal();
};

/* ---------------- SMS ---------------- */

window.sendSMS = function(){

  window.location.href =

`sms:${currentVoucher.phone}?body=${encodeURIComponent(

`Fuel Voucher
Code: ${currentVoucher.code}
Vehicle: ${currentVoucher.vehicle}
Amount: R${currentVoucher.amount.estimated}`

)}`;

  closeModal();
};

window.closeModal = function(){

  document.getElementById("sendModal").style.display =
    "none";
};

/* ---------------- LOAD VOUCHERS ---------------- */

async function loadVouchers(){

  const list =
    document.getElementById("voucherList");

  list.innerHTML = "";

  const snap =
    await getDocs(collection(db,"fuel_vouchers"));

  let todayTotal = 0;

  let monthlyTotal = 0;

  const today =
    new Date().toISOString().split("T")[0];

  const currentMonth =
    new Date().getMonth();

  const currentYear =
    new Date().getFullYear();

  const todayVouchers = [];

  snap.forEach(doc => {

    const d = doc.data();

    if(!d.date) return;

    const voucherDate =
      new Date(d.date);

    const amount =
      d.amount?.actual ||
      d.amount?.estimated ||
      0;

    /* MONTH */

    if(

      voucherDate.getMonth() === currentMonth &&
      voucherDate.getFullYear() === currentYear

    ){

      monthlyTotal += amount;
    }

    /* TODAY */

    if(d.date === today){

      todayTotal += amount;

      todayVouchers.push(d);

    }

  });

  /* NEWEST FIRST */

  todayVouchers.reverse();

  /* RENDER */

  todayVouchers.forEach(d => {

    const div =
      document.createElement("div");

    const cls =

      d.status === "VERIFIED"
      ? "verified"

      : d.status === "ISSUED"
      ? "issued"

      : d.status === "REJECTED"
      ? "rejected"

      : "pending";

    div.className = `voucher ${cls}`;

    div.innerHTML =

`
<b>${d.vehicle}</b><br>
${d.driver}<br>
R${d.amount.estimated}<br>
Status: ${d.status}<br>
Code: ${d.code}
`;

    list.appendChild(div);

  });

  document.getElementById("totalFuel").innerText =

    "R" + todayTotal.toLocaleString();

  document.getElementById("monthlyFuel").innerText =

    "R" + monthlyTotal.toLocaleString();

}

loadVouchers();

</script>

</body>
</html>
