<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Courier Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <img src="https://res.cloudinary.com/dwxgkbuln/image/upload/v1771237505/pakisa_logistics_express_pty_ltd_logo-removebg-preview_gr7h0r.png" alt="Pakisa Logo" class="logo">
        
        <h2>Sign In</h2>
        
        <!-- Email Login -->
        <input type="email" placeholder="Email Address" id="email">
        <input type="password" placeholder="Password" id="password">
        <button id="email-login">Sign In with Email</button>
        
        <div class="divider"><span>OR</span></div>
        
        <!-- Google Login -->
        <button id="google-login-btn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Sign in with Google
        </button>
    </div>
</body>
</html>
