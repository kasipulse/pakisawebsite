<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pakisa Booking</title>
</head>
<body>
    <select id="vehicle"></select>
    <select id="driver"></select>
    <button onclick="submit()">Submit</button>

    <script>
        const API = "https://pakisa-booking-system.onrender.com";
        
        async function init() {
            const res = await fetch(`${API}/api/bootstrap`);
            const data = await res.json();
            
            const vSel = document.getElementById('vehicle');
            data.vehicles.forEach(v => vSel.innerHTML += `<option>${v.registration}</option>`);
            
            const dSel = document.getElementById('driver');
            data.drivers.forEach(d => dSel.innerHTML += `<option>${d.name}</option>`);
        }
        init();
    </script>
</body>
</html>
