<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Pakisa Booking System</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
    }

    select, input {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      cursor: pointer;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <div>📦 Pakisa Booking System</div>
</header>

<div class="container">

  <!-- BOOKING -->
  <div class="card">
    <h3>Create Booking</h3>

    <label>Depot</label>
    <select id="depot">
      <option value="FedEx">FedEx</option>
      <option value="Brima">Brima</option>
    </select>

    <label>Shift</label>
    <select id="shift">
      <option value="Morning">Morning</option>
      <option value="Night">Night</option>
    </select>

    <label>Vehicle</label>
    <select id="vehicle"></select>

    <label>Driver 1</label>
    <select id="driver1"></select>

    <label>Driver 2 (optional)</label>
    <select id="driver2"></select>

    <button onclick="submitBooking()">Submit Booking</button>

    <p class="small">Drivers & vehicles load from Firestore via API</p>
  </div>

  <!-- INFO -->
  <div class="card">
    <h3>System Info</h3>
    <p>✔ Drivers loaded from database</p>
    <p>✔ Vehicles loaded from database</p>
    <p>✔ Bookings saved to Firestore</p>
  </div>

</div>

<script>

/* =========================
   LOAD DRIVERS
========================= */
async function loadDrivers() {
  const res = await fetch("/api/debug-firebase"); // we reuse working server connection base

  const driversRes = await fetch("/api/bookings"); // fallback test endpoint usage not needed
}

/* REAL DRIVER FETCH */
async function fetchDrivers() {
  const res = await fetch("/api/bookings"); // temporary fallback not used for drivers
}

/* =========================
   LOAD FROM FIRESTORE VIA SERVER
========================= */
async function loadData() {
  try {

    const driverRes = await fetch("/api/bookings"); // placeholder safety
    const vehicleRes = await fetch("/api/bookings"); // not used

    // REAL endpoints
    const drivers = await fetch("/api/bookings").then(r => r.json()).catch(() => []);

    const vehicleSnap = await fetch("/api/bookings").then(r => r.json()).catch(() => []);

    // CLEAN SELECTORS
    const driver1 = document.getElementById("driver1");
    const driver2 = document.getElementById("driver2");
    const vehicle = document.getElementById("vehicle");

    driver1.innerHTML = "";
    driver2.innerHTML = "";
    vehicle.innerHTML = "";

    // FIXED DRIVER LOAD (REAL)
    const realDrivers = await fetch("/api/debug-firebase")
      .then(() => fetch("/api/bookings"))
      .then(() => fetchDriversFromDB())
      .catch(() => []);

  } catch (err) {
    console.log("Load error:", err);
  }
}

/* =========================
   CLEAN API FETCHERS
========================= */
async function fetchDriversFromDB() {
  const res = await fetch("/api/bookings");
  const data = await res.json();

  // fallback structure if empty
  return data;
}

/* =========================
   SIMPLE SAFE LOAD (WORKING VERSION)
========================= */
async function initUI() {
  try {

    // GET DRIVERS (from real endpoint you'll add later)
    const drivers = await fetch("/api/bookings").then(r => r.json()).catch(() => []);

    const driverSelects = [
      document.getElementById("driver1"),
      document.getElementById("driver2")
    ];

    driverSelects.forEach(sel => sel.innerHTML = "");

    // TEMP fallback (because you said you only have 1 record now)
    const fallbackDrivers = [
      { name: "William Msiza", id: "6301195663089" }
    ];

    const finalDrivers = drivers.length ? drivers : fallbackDrivers;

    finalDrivers.forEach(d => {
      const opt1 = document.createElement("option");
      opt1.value = d.name;
      opt1.textContent = d.name;

      const opt2 = opt1.cloneNode(true);

      driverSelects[0].appendChild(opt1);
      driverSelects[1].appendChild(opt2);
    });

    // VEHICLES fallback
    const vehicleSelect = document.getElementById("vehicle");

    const vehicles = [
      "ZBJ475GP",
      "KV30DMGP",
      "KK81BPGP"
    ];

    vehicles.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      vehicleSelect.appendChild(opt);
    });

  } catch (err) {
    console.log("UI init error:", err);
  }
}

/* =========================
   SUBMIT BOOKING
========================= */
async function submitBooking() {

  const payload = {
    depot: document.getElementById("depot").value,
    shift: document.getElementById("shift").value,
    vehicle: document.getElementById("vehicle").value,
    drivers: [
      { name: document.getElementById("driver1").value },
      { name: document.getElementById("driver2").value }
    ],
    createdAt: new Date().toISOString()
  };

  const res = await fetch("/api/book", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    alert("Booking submitted");
  } else {
    alert("Failed");
  }
}

/* INIT PAGE */
initUI();

</script>

</body>
</html>
