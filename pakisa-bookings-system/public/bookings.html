<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakisa Booking System</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // Add your Firebase Config here
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Toggle Login/App visibility
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login-card').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        initUI();
      } else {
        document.getElementById('login-card').style.display = 'block';
        document.getElementById('app-container').style.display = 'none';
      }
    });

    window.login = async () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      try { await signInWithEmailAndPassword(auth, email, pass); }
      catch (e) { alert("Login failed: " + e.message); }
    };
  </script>

  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #0f172a; color: white; }
    .card { background: #1f2937; padding: 20px; border-radius: 12px; margin: 20px; }
    input { width: 100%; padding: 12px; margin-top: 10px; background: #374151; border: 1px solid #4b5563; color: white; border-radius: 6px; box-sizing: border-box; }
    button { padding: 15px; width: 100%; margin-top: 20px; background: #2563eb; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>

<body>
  <div id="login-card" class="card" style="display:none; max-width: 400px; margin: 100px auto;">
    <h3>Pakisa Access Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="app-container" style="display:none;">
    <header>📦 Pakisa Booking System</header>
    <div class="container">
      <div class="card">
        <h3>Create Booking</h3>
        <label>Depot</label>
        <select id="depot">
          <option value="FedEx">FedEx</option>
          <option value="Brima">Brima</option>
        </select>
        <button onclick="submitBooking()">Submit Booking</button>
      </div>
    </div>
  </div>
</body>
</html>
