<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakisa Booking System</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #111827;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .container {
      padding: 15px;
      display: grid;
      gap: 20px;
    }

    /* Desktop View: 2 columns for wider screens */
    @media (min-width: 768px) {
      .container { grid-template-columns: 1fr 1fr; }
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
    }

    label { display: block; margin-top: 10px; font-size: 14px; color: #9ca3af; }
    select, input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      background: #374151;
      border: 1px solid #4b5563;
      color: white;
      border-radius: 6px;
      box-sizing: border-box; /* Prevents padding from breaking layout */
    }

    button {
      padding: 15px;
      width: 100%;
      margin-top: 20px;
      cursor: pointer;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 8px;
      font-weight: bold;
    }

    button:active { background: #1d4ed8; transform: scale(0.98); }
  </style>
</head>

<body>

<header>📦 Pakisa Booking System</header>

<div class="container">
  <div class="card">
    <h3>Create Booking</h3>
    <label>Depot</label>
    <select id="depot">
      <option value="FedEx">FedEx</option>
      <option value="Brima">Brima</option>
    </select>

    <label>Shift</label>
    <select id="shift">
      <option value="Morning">Morning</option>
      <option value="Night">Night</option>
    </select>

    <label>Vehicle</label>
    <select id="vehicle"></select>

    <label>Driver 1</label>
    <select id="driver1"></select>

    <label>Driver 2 (optional)</label>
    <select id="driver2"></select>

    <button onclick="submitBooking()">Submit Booking</button>
  </div>

  <div class="card">
    <h3>System Info</h3>
    <p>✔ Mobile optimized interface</p>
    <p>✔ API connected to server</p>
  </div>
</div>

<script>
/* =========================
   INITIALIZATION
========================= */
async function initUI() {
  try {
    const res = await fetch("/api/bootstrap");
    const data = await res.json(); 

    const driver1 = document.getElementById("driver1");
    const driver2 = document.getElementById("driver2");
    const vehicleSelect = document.getElementById("vehicle");

    // Populate Drivers
    [driver1, driver2].forEach(sel => {
      sel.innerHTML = '<option value="">Select Driver</option>';
      data.drivers.forEach(d => {
        const opt = document.createElement("option");
        opt.value = JSON.stringify(d);
        opt.textContent = `${d.name} ${d.surname}`;
        sel.appendChild(opt);
      });
    });

    // Populate Vehicles
    data.vehicles.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v.registration;
      opt.textContent = v.registration;
      vehicleSelect.appendChild(opt);
    });
  } catch (err) {
    console.error("UI Load Error:", err);
  }
}

/* =========================
   SUBMIT
========================= */
async function submitBooking() {
  const d1 = JSON.parse(document.getElementById("driver1").value);
  const d2Val = document.getElementById("driver2").value;
  
  const payload = {
    depot: document.getElementById("depot").value,
    shift: document.getElementById("shift").value,
    vehicle: document.getElementById("vehicle").value,
    drivers: d2Val ? [d1, JSON.parse(d2Val)] : [d1]
  };

  const res = await fetch("/api/book", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (res.ok) alert("Booking submitted!");
  else alert("Failed to submit.");
}

initUI();
</script>
</body>
</html>
