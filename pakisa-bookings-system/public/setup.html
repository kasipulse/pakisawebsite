<!DOCTYPE html>
<html>
<head>
  <title>Pakisa Setup</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    pre {
      background: #111827;
      padding: 10px;
      overflow: auto;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .success { color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>

<body>

<h1>Pakisa System Setup</h1>

<div class="card">
  <h3>1. Initialize System</h3>
  <button onclick="initSystem()">Run Setup</button>
</div>

<div class="card">
  <h3>2. Load Drivers (Bulk)</h3>
  <button onclick="loadDrivers()">Insert All Drivers</button>
  <pre id="driverLog"></pre>
</div>

<div class="card">
  <h3>3. Load Vehicles (Bulk)</h3>
  <button onclick="loadVehicles()">Insert All Vehicles</button>
  <pre id="vehicleLog"></pre>
</div>

<script>

/* =========================
   DRIVER DATA
========================= */
const drivers = [
  { name: "William", surname: "Msiza", idNumber: "6301195663089" },
  { name: "Jonathan", surname: "Mashele", idNumber: "7401135639089" },
  { name: "Happy", surname: "Mdhluli", idNumber: "8012245688087" },
  { name: "Tumelo", surname: "Molelwa", idNumber: "0302185438082" },
  { name: "Tebogo", surname: "Mofokeng", idNumber: "9206075329080" },
  { name: "Mpho", surname: "Mahlaba", idNumber: "8710065876084" },
  { name: "Thulani", surname: "Madhlala", idNumber: "8008215463489" },
  { name: "Jess", surname: "Molaba", idNumber: "7801135811085" },
  { name: "Joseph", surname: "Moagi", idNumber: "8809045582083" },
  { name: "Vishnu", surname: "Pillay", idNumber: "6603175045082" },
  { name: "Stanley", surname: "Mofokeng", idNumber: "6502035306082" },
  { name: "Sesi", surname: "Magongwa", idNumber: "8703180458086" }
];

/* =========================
   VEHICLE DATA
========================= */
const vehicles = [
  "ZBJ475GP",
  "KV30DMGP",
  "KK81BPGP",
  "LW47BHGP",
  "KF66JPGP",
  "KL08LPGP",
  "JX24LLGP"
];

/* =========================
   SAFE RESPONSE PARSER
========================= */
async function safeJson(res) {
  const text = await res.text();

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    throw new Error("Server did not return JSON: " + text);
  }
}

/* =========================
   INIT SYSTEM
========================= */
async function initSystem() {
  try {
    const res = await fetch("/api/setup", { method: "POST" });
    const data = await safeJson(res);

    if (!res.ok) throw new Error(data.error || "Setup failed");

    alert("System Initialized");
  } catch (err) {
    alert("Setup failed: " + err.message);
  }
}

/* =========================
   LOAD DRIVERS
========================= */
async function loadDrivers() {
  const log = document.getElementById("driverLog");
  log.innerHTML = "Loading drivers...\n\n";

  for (const d of drivers) {
    try {
      const res = await fetch("/api/add-driver", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(d)
      });

      const data = await safeJson(res);

      if (!res.ok) throw new Error(data.error || "Failed");

      log.innerHTML += `<span class="success">SUCCESS:</span> ${d.name} ${d.surname}\n`;

    } catch (err) {
      log.innerHTML += `<span class="error">FAILED:</span> ${d.name} ${d.surname} → ${err.message}\n`;
    }
  }

  log.innerHTML += "\nDONE\n";
}

/* =========================
   LOAD VEHICLES
========================= */
async function loadVehicles() {
  const log = document.getElementById("vehicleLog");
  log.innerHTML = "Loading vehicles...\n\n";

  for (const v of vehicles) {
    try {
      const res = await fetch("/api/add-vehicle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ registration: v })
      });

      const data = await safeJson(res);

      if (!res.ok) throw new Error(data.error || "Failed");

      log.innerHTML += `<span class="success">SUCCESS:</span> ${v}\n`;

    } catch (err) {
      log.innerHTML += `<span class="error">FAILED:</span> ${v} → ${err.message}\n`;
    }
  }

  log.innerHTML += "\nDONE\n";
}

</script>

</body>
</html>
